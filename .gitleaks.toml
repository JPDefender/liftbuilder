[extend]
useDefault = true

[allowlist]
description = "LiftBuilder project allowlist"
paths = [
  "node_modules",
  "vendor",
  "dist",
  ".github/workflows/ci.yml",
]

# Allow CHECKSUMS.sha256 — these are file hashes, not secrets
[[rules]]
id = "checksums-file"
description = "Allow SHA-256 hashes in CHECKSUMS.sha256"
path = "CHECKSUMS\\.sha256"
allowlist.regexes = ["sha256", "sha384", "[0-9a-f]{64}"]
