name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security test suite
        run: npm run test:security

      - name: Run full test suite
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (no High or Critical in production deps)
        run: npm audit --audit-level=high --omit=dev

  vendor-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify vendor file checksums
        run: |
          echo "Checking vendor file SHA-256 checksums against CHECKSUMS.sha256..."
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "$line" ]] && continue
            hash=$(echo "$line" | awk '{print $1}')
            file=$(echo "$line" | awk '{print $2}')
            actual=$(openssl dgst -sha256 "$file" | awk '{print $2}')
            if [ "$actual" != "$hash" ]; then
              echo "CHECKSUM MISMATCH: $file"
              echo "  expected: $hash"
              echo "  actual:   $actual"
              exit 1
            fi
            echo "OK: $file"
          done < CHECKSUMS.sha256
          echo "All vendor checksums verified."

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
